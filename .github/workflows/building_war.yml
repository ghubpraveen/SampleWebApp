name: Build WAR

on:
  push:
    branches:
      - uat
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up environment variables
        run: |
          echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "COMMIT_HASH=${GITHUB_SHA}" >> $GITHUB_ENV
          echo "BUILD_CAUSE=github-actions" >> $GITHUB_ENV
          echo "REQUIRED=Build" >> $GITHUB_ENV
          echo "BUILD_ENV=uat" >> $GITHUB_ENV
          echo "JOB_NAME=${{ github.repository }}" >> $GITHUB_ENV
          echo "WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Create params file
        run: |
          cat <<EOF > build-params.env
          JOB_NAME=$JOB_NAME
          BRANCH=$BRANCH
          COMMIT_HASH=$COMMIT_HASH
          BUILD_ENV=$BUILD_ENV
          REQUIRED=$REQUIRED
          BUILD_CAUSE=$BUILD_CAUSE
          WORKSPACE=$WORKSPACE
          EOF

          echo "===== Params File ====="
          cat build-params.env

      - name: Make deploy.sh executable
        run: chmod +x deploy.sh

      - name: Run deploy.sh (WAR build)
        run: |
          set -e
          set -x

          bash ./deploy.sh build-params.env

      - name: Archive WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: |
            **/*.war
